body:
  text: 雲棲蓮池大師作後學沙彌實賢注西方發願文釋此願文大分為二初題目二入文題目五字有通有別西方發願是別名文之一字是通名就別名中西方二字是所發願之一字為能發發字具兼能所又西方是所願之處願是能發之心言西方則該依報正報言發願則攝自利利他依報則七寶莊嚴圓融四土正報則彌陀聖衆一體三身四土者一常寂光土二實報莊嚴土三方便有餘土四凡聖同居土三身者法身報身應身應有勝劣勝則巍巍堂堂劣則丈六八尺問祇一西方何分四土又祇是一佛何有三身得無割裂分張邪答如祇是一月而有光影不同又如祇是一鏡而有影像光明不同何曾割裂光影分張鏡像邪法身如月報身如光化身如影寂光如鏡體實報如鏡光方便同居如鏡影像在佛則唯一法性身寂光土為衆生故現起二身應下三土為十地三十心菩薩十住十行十回向名三十心現圓滿報身居實報土為聲聞菩薩現勝劣二身居方便土為凡夫初發心菩薩現劣應身居同居土此中身土被機祇約圓教一往而論若具明四教其相千差恐煩不引問此之四土為同一處為各異邪答亦同亦異同則譬如一水天人魚鬼四見差別異則各各境界所處不同然上能知下下不知上應化亦爾菩薩能應同居方便聲聞能應同居凡夫但在同居不能詣上故云亦爾彌陀究竟三身聖衆分得三身凡夫但有理具而無事用此之身土但約機見差別故有不同實則依正不二體用無差故曰圓融一體也自利則現生斷惑後世往生利他亦爾又言發者以激動為義願者以希求為義激動則如箭離弦勢不中止希求則如好美色如謀重利乃有始焉發願往生少焉退惰者此非發也又有口談淨土心戀娑婆者亦非願也又願之一字具該信行信則自他因果事理不虗信得自心是佛他人亦然念佛為因往生作佛為果實也西方是事離心本性是理一一真實故云不虛行則專事持名不雜不散願則心心好樂念念希求如此三事缺一不可有信行而無願者有矣未有有願而無信行者也問有人聞說西方淨土心生好樂然不念佛得往生否答若果心生好樂定起希求若起希求必然念佛好樂不希求定非好樂希求不念佛豈是希求好樂希求念佛而不往生者未之有也問有人於此亦好亦求亦念但世間心重貪戀塵勞得往生否答只要將猛不怕賊強若果希求心切繫念心專則貪戀雖重自然漸漸輕微亦當往生如捨銀取金捨魚取熊掌則亦何難之有第恐願力不敵愛力佛念不勝欲念悠悠忽忽半信半疑則吾末如之何也已矣又問為善生天作惡入地獄本不發願念佛往生亦復如是何須待願而後生邪答三界因果隨業所感固不待願而成求生西方出世正因若無大願要期縱然念佛決不成就譬如牛行熟路雖無御者亦知歸宿如行生路決無趨向必須御者手執繩頭復加鞭䇿然後方行衆生心性如牛三界如熟路西方如生路願如御者信如手念似繩頭誓如鞭䇿往生如行路無願不生如牛無御故必以發願為要也問信行願三既聞命矣但十方皆有佛國何須獨願西方答以彼土中阿彌陀佛與此土衆生深有因緣諸佛不爾是以專求彼國不願餘方又彼土中依報正報超過十方諸佛所讚不唯凡夫願往菩薩亦然不唯此方願往餘方皆然既無八難三途亦無三毒八苦衣食自然壽命無量水鳥樹林皆能說法聲聞大士其數甚多諸上善人俱會一處所以彌陀經中釋迦如來苦口丁寧汝等衆生應當發願願生彼國也又問祖師云智者知心是佛愚人樂往西方由是而言則愚人只好念佛智者固宜參禪若槩勸往生恐違祖意非通論也答若言往生是愚則從上諸祖蓮社高賢乃至馬鳴龍樹文殊普賢亦皆愚邪亦不知心邪當知盡理而言唯佛一人稱為智者餘皆是愚若就事論乃有千差談何容易嗚呼祖師破人執有故發此言今汝執空因藥致病不知有病易遣空病難除天下至愚非汝而誰又問古有發願來生生逢中國長遇明師正信出家童真入道者此復云何答在昔像教方隆人根尚利明師易得入道非難縱現世未明來生可望故發此願也今則不然佛法愈衰人根愈鈍邪多正少退易進難內障外魔無人不具明師善友希世難逢但見出家滿地未聞得道何人纍劫未成後生寧致青公哲老敗轍昭然大集懸記可為誠證大集經云後五百歲中億億人修行無有一人得道唯依念佛法門得度生死乃有不知利害妄效古人仍發此願者過矣且言中國則孰如安養言明師則孰愈彌陀言出家則孰若橫超三界言入道則孰若華開見佛悟無生忍不是之願而願娑婆我信是人誠為愚執問求生西方固所願也但我下劣凡夫罪業深重福善輕微如何容易得生安養答餘門學道須賴行人自力念佛往生全賴彌陀願力自力難故纍劫未成他力易故一生可致是以一日七日便得往生十念一念亦能見佛縱十惡罪人佛亦不棄況十善凡夫一生發願念佛而不得往生乎且一稱洪名滅罪八十億劫何疑業重暫持聖號勝於布施百年何慮福輕但辦信心決不相賺又問兜率內院近在此界又有補處菩薩於中說法亦可上升親近大士何須近越此方遠超他土答西方淨土是仗彌陀願力接引往生故雖遠而易屆兜率內院要賴行人定力方得上升故雖近而難生苟無禪定是無翅欲飛求升反墜矣且彼天欲樂初心尚迷西域三人可為殷鑒西域記云無著世親師子覺兄第三人發願同生兜率見彌勒佛約以先去上生必來相報後師子覺先逝杳無消息世親繼歾復隔一年方來報語無著問曰生兜率否答曰已生親見彌勒又問師子覺何在答曰彼生外院耽著欲樂不見菩薩是以不來相報故知小菩薩尚爾何況凡夫安可不知利害又問東方藥師佛國依正莊嚴與西方無異又有八大菩薩臨終示路亦可往生何須定願西方淨土答藥師一經主於消灾延壽不專勸往生其言菩薩示路是為一類不定善根衆生欲隨方受生供佛聞法者此人福慧具足所願皆得故聞藥師佛名隨念即生彼國八大菩薩特為示路指歸其處耳亦非一定往生彼國也故曰或有因此生於天上及生人間為輪王而攝四洲安四民於十善此非福慧具足而能之乎今彌陀佛國專勸往生諸經廣談十方咸往彌陀聖衆垂手提擕釋迦諸佛讚歎護念而乃捨通途而行局路執暫語以廢常談東西既無定向持念又復不一既無福慧又鮮神通未得隨生翻成莽蕩可弗審歟今欲一其志念專其趣向不歸安養將安歸邪專其趣向故曰西方一其志念故曰發願文者能詮章句也又願有通別通則四宏誓願別則隨心所發種種誓願又通則皆名為願別則菩提名發心四宏名發誓求生西方名發願又回向亦名為願如華嚴十回向文一一皆云願衆生等是也又求生西方總攝一切菩提誓願及十方三世一切佛法無有遺餘故以此題而冠篇首也然此願文事理周備行願深廣諸有智者當味其言力行其事庶幾自他俱利因果皆成不徒為文字語言音聲唱和而已初釋題目竟二入文為二初歸命請加二發願回向今初稽首西方安樂國接引衆生大導師我今發願願往生唯願慈悲哀攝受偈文初二句是歸命後二句是請加發願之始必先歸命於佛者所以求證此心也稽首者禮佛之儀式謂以頭著地稽留少頃而起故名稽首表敬之極也西方安樂國是依報接引衆生大導師是正報言安樂國者無八苦故名安無三毒故名樂法王所統名為國言接引者衆生沒在苦海佛以智手接之令出著於五欲佛以種種樂事誘之令離故曰接引言導師者導人以正道也衆生顛倒以苦為樂以邪為正不知出要佛為分別娑婆是苦西方是樂令起欣厭發願往生故名導師外道不知邪正妄立宗徒是師非導聲聞能出三界不化衆生是導非師菩薩能化衆生雖是導師不名為大唯有彌陀世尊乘大願船入生死海不著此岸不居彼岸不住中流而導衆生到於彼岸如是利益遍於十方盡於三世無暫休息是故獨稱為大導師也我今願往是自迷己懷唯願攝受是請求加護愛念名慈憐愍名悲如母念子心無捨離是名攝受初歸命請加竟二發願回向二初發願二回向初又二初自利二利他初又三初發心持名二懺悔三障三發願今初弟子某甲普為四恩三有法界衆生求於諸佛一乘無上菩提道故專心持念阿彌陀佛萬德洪名期生淨土普為四恩等是所緣之境求於諸佛等是能發之心專心持念等是所念之佛期生淨土是所望之處蓋發菩提心必先緣境若無此境則心無所依亦無所發然境有廣狹遠近不同四恩狹而最近三有居中法界衆生則遠而復廣境既如此心亦復然必先從親至疏由近及遠也言四恩者在家則天地君親師出家則父母師僧國王檀越言三有者即是三界謂欲界色界無色界隔歷不同曰界因果不亡曰有此三界中即六道四生住處舉依報以該正報也法界衆生即十方無量世界一切衆生亦即九法界衆生非二非三故名一運載衆生故名乘無上非有上菩提者能覺之智也言不但專為自利乃欲普為四恩又不但為四恩亦欲普度六道四生又復不為一三界六道四生乃是普為十方無量世界一切衆生欲令度脫使其皆得一乘無上菩提之道故發此心也專心者不雜餘事持念者受而不忘一名而具萬德故云萬德洪名期者望也無有五濁故名淨土蓋念佛而不發大菩提心不與彌陀本願相應終不往生雖發菩提心不專念佛亦不往生故必以發菩提心為正因念佛為助緣而後期生淨土修淨業者不可不知二懺悔三障又以業重福輕障深慧淺染心易熾淨德難成今於佛前翹勤五體披瀝一心投誠懺悔我及衆生曠劫至今迷本淨心縱貪嗔癡染穢三業無量無邊所作罪垢無量無邊所結冤業願悉消滅又以下明懺悔之因今於下明懺悔之法我及衆生下正陳懺悔此一段文承上文言雖然念佛發心期生淨土而我罪業厚重福善輕微障緣既深智慧復淺染污心識如火熾然清淨功德一無成就興言及此焉不悲傷蓋末世凡夫鈍置如此如此罪障能障行人不得往生將如之何此懺悔之宜急務也言業重福輕者業即十惡福即十善言十惡者身有三謂殺盜淫口有四謂妄言綺語兩舌惡口意有三謂貪嗔癡翻此十惡則名十善言重則十惡具造言輕則一善單修又上品十惡名業重下品十善名福輕如十惡業殺生則以父母師僧為上餘人為中畜生微細昆蟲為下餘皆例此可知十善反此可以意得又熾然作惡名業重泛然行善名福輕乃有嗔他則呪其速滅杖彼則立使隨亡此業重也又或方才念佛便謂口酸適欲禮拜又言腰痛此福輕也言障深慧淺者障有二種一者外障二者內障外障有二一者塵緣逼迫二者魔外牽纏內障復二一者疾病夭殤二者愚癡顛倒慧有二種一者方便慧二者真實慧聞思修為方便見道為真實見道有二一者小乘二者大乘大乘所見復有二種一者空假二者中道中道復二一者但中二者圓中若就諸慧論深淺者聞慧為淺思慧為深乃至但中為淺圓中為深傅傅互論可知言障深則內外交攻言慧淺則聞熏薄解乃有甫欲修行便生惡疾才能向道適遇邪師此障深也又有未得內凡便謂已超佛地稍通世智自言已入悟門此慧淺也貪嗔癡名染心戒定慧名淨德言易熾者嗔如火𦦨觸乾草而展轉增高愛似藕絲割鈍刀而牽連不斷癡則密織見網愈縛愈纏深種邪根彌生彌廣言難成者戒則律儀篇聚持少犯多定則大小禪那造修無地慧則權實妙智證悟無門乃有一毫染著纍月牽懷片語不投終身結怨者此易熾也其或才登戒品已破浮囊一入禪堂但增昏掉者此難成也自非深生慚愧痛自尅責懇到懺悔則縱經塵劫滅罪良難次懺悔法中翹勤五體表外儀恭披瀝一心明內心敬兩肘兩膝及額名為五體披瀝謂開發洗蕩也以我之誠歸投於佛故曰投誠懺悔者斷相續心也由昔身行惡法故今五體翹勤復由意起貪嗔故用一心披瀝又由舌談惡語故今口陳懺悔又昔無始身業猛利故用翹勤而懺意業穢污故用披瀝而懺口業粗獷故用陳詞急切而懺也次正陳懺悔中我者行人自謂衆生即四恩三有六道四生謂我與法界衆生自從曠劫直至今生常常起惑造業未曾休息非是一人獨造亦非一生一處所造非是一人故云我及衆生非是一生故云曠劫至今非是一處故云無量無邊蓋由衆生從無始來世世生生互為眷屬更相主伴更相佐助罪業方成造業既同懺悔亦爾故須遍緣法界衆生為其懺悔也問曠劫罪業應已受報云何直至今生猶未滅邪若已受報則不須懺若猶不滅則懺亦無益答衆生造業受報有三一者現報二者生報三者後報現報一生即受生報次生方受後報經無量劫乃受復有二種一者定業二者不定若過去業屬現報者則亦已受若生報後報正在將來豈可不殷勤懺悔邪又若是定業則不可懺若不定者懺則除滅何謂無益邪小乘所明有定不定業大乘所明一切不定迷本淨心二句是懺煩惱障染穢三業四句是懺業障所結冤業二句是懺報障又迷本淨心是根本惑縱貪嗔癡是枝葉惑言迷則如雲覆月光明不現言縱則養賊為子自劫家珍身口意三與煩惱相應名為染穢造作十惡五逆名為罪垢三業為能造罪垢為所造罪垢既成必招冤業冤必有報故名報障也言無量無邊略有五意一約心一念塵勞具有八萬何況相續二約境一處所作已自無量何況十方三約事一業若成罪無邊際何況諸業四約時一生所作亦應無量何況曠劫五約人一人所作已自無邊何況衆生所以業若有形虗空難受也冤業有三如云人死為羊羊死為人死死生生遞相吞噉此名殺冤汝負我命我還汝債經百千劫常在生死此名盜冤汝愛我心我憐汝色經百千劫常在纏縛此名淫冤問淫則彼此無怨何亦名冤答殺盜二業名為怒冤淫名喜冤喜怒俱冤無非是業衆生顛倒以怨為親良由於此願悉消滅者謂三障俱滅也二懺悔三障竟三發願三初總願二別願三總結今初從於今日立深誓願遠離惡法誓不更造勤修聖道誓不退惰誓成正覺誓度衆生此即四宏誓願也修行若無誓願則有退失故以此四法自制其心則不生懈怠也此之四宏依於圓教無作四諦而發名深誓願願不依諦名為狂願若非無作亦不名深言無作者謂本性具足四皆無所造作也天台大師云由迷理故涅槃是生死名為苦諦菩提是煩惱名為集諦由悟理故生死即涅槃名為滅諦煩惱即菩提名為道諦今略釋之生死煩惱是衆生因果菩提涅槃是諸佛因果然衆生諸佛但有名字生死煩惱菩提涅槃亦但有名字究極而言祇是一心以由無始迷此一心全以菩提涅槃而為煩惱生死故於今日悟此一心即以煩惱生死而為菩提涅槃名雖有二體則無二如水成冰冰還成水此即無作四諦也問衆生諸佛但有名字則誠然矣生死煩惱是染穢法菩提涅槃是清淨法升沈迥異優劣天淵云何言亦但有名字邪答若就事論誠如所說若約理論一一皆無實法喻如梨園子弟扮作貧兒身行丐食意起希求須臾又扮帝王身登九五意生歡悅有智慧者不應於是而生實想謂有貴賤高𢍉之異生死煩惱菩提涅槃亦復如是凡夫謂實諸佛聖人知其非真又問生死煩惱不實可也若菩提涅槃亦非真實何須辛苦修證邪答所言非真但破執著不言修證亦無若執非真反成邪見矣乃有身犯律儀口談玄妙以念佛為愚夫以修持為著相此末世聰明人參禪大病不可不知今言遠離惡法誓不更造即是煩惱無盡誓願斷此依集諦發心勤修聖道誓不退惰即是法門無量誓願學此依道諦發心誓成正覺即是佛道無上誓願成此依滅諦發心誓度衆生即是衆生無邊誓願度此依苦諦發心文雖不次義無二也云何依於苦諦發心謂觀衆生為生老病死之所逼迫生大苦惱以是因緣發誓願云我當早度生死亦度無量衆生得出生死生死即所觀苦諦因觀生死故願度脫是名依苦諦發心云何依於集諦發心謂觀衆生為貪欲嗔恚愚癡邪見之所惱害不能自拔以是因緣發誓願云我當自斷煩惱亦斷衆生無量煩惱令得解脫煩惱即所觀集諦因觀煩惱過患故欲斷除是名依集諦發心云何依於滅諦發心謂觀諸佛已滅煩惱得解脫樂具有無量神通自在而諸衆生不覺不知妄受諸苦以是因緣發誓願云我當勤修方便得大涅槃寂滅之樂亦令衆生同得此樂涅槃佛果即所觀滅諦因觀佛果故有希求是名依滅諦發心云何依於道諦發心謂觀六度萬行恆沙法門具有無量稱性法樂而諸衆生不習不修妄造諸業以是因緣發誓願云我當精勤修學無量法門亦令衆生修學是法法門即所觀道諦因觀法門故願修學是名依道諦發心也然此祇是事相若知理性具足則四皆無作云何無作謂衆生是假名度無所度煩惱無實性斷無所斷法門元具足學無所學佛道本現成成無所成此名無作四宏誓願依於無作四諦而發也二別願二初求佛護念二正發願今初阿彌陀佛以慈悲願力當證知我當哀愍我當加被我願禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土得蒙阿彌陀佛甘露灌頂光明照身手摩我頭衣覆我體阿彌陀下五句明護念之心願禪觀下明護念之事諸佛心者是大慈悲以慈悲故則有誓願以誓願力則當證知由證知故復當哀愍以哀愍故必應加被此彌陀護念之心也禪觀謂十六觀始從日觀乃至九品往生或具觀十六或專一觀言一觀者且指總觀謂觀己身坐蓮華中作蓮花開合想蓮花開時彌陀聖衆俱放光明來照我身水鳥樹林皆演妙法此名總觀或但觀丈六佛相在池水上垂手提𢹂己身胡跪華中亦可問今既專持名號云何復令觀想答終日持名暫時觀想以觀助念念則不散縱令心粗境細亦可託像而觀復何礙乎禪觀是醒時夢寐是睡時或醒或睡皆得見佛若不觀想則見佛為難問觀中見佛得無魔事否答參禪人本不念佛而佛忽現此則心境相違名為魔事念佛人本自觀佛佛隨相現此名感應道交非魔事也然須了知所見之佛如水中月非有非無不可取著若生取著則恐反成魔事切宜慎之金色身是正報寶嚴土是依報歷是經歷寶嚴者七寶莊嚴也餘文可解二正發願三初現生願二臨終願三往生願今初使我宿障自除善根增長疾空煩惱頓破無明圓覺妙心廓然開悟寂光真境常得現前由甘露灌頂故宿障除由光明照身故善根長由手摩我頭故煩惱無明頓破由衣覆我體故妙心真境現前宿障指惑業苦三障善根即戒定慧根昏煩之法惱亂心神名為煩惱指見思惑於第一義諦不了名曰無明指根本惑由此二惑故妙心真境不能顯現今二惑頓空故開悟現前也圓覺是能證智寂光是所證理現前者洞然明白也二臨終願至於臨欲命終預知時至身無一切病苦厄難心無一切貪戀迷惑諸根悅豫正念分明捨報安詳如入禪定阿彌陀佛與觀音勢至諸聖賢衆放光接引垂手提𢹂樓閣幢幡異香天樂西方聖境昭示目前令諸衆生見者聞者歡喜感歎發菩提心臨命終時第八識將去時也三日七日為預知四大不調名病苦水火刀兵毒藥等名厄難貪戀有四一終歲持齊一朝食肉二長年念佛此日貪生三恩愛牽纏難割難捨四許願保禳求神服藥迷惑有三一疑罪業深重二疑功行淺薄三疑佛不來迎諸根即眼等五根正念是意根無病無難故悅豫無貪無惑故分明捨所受身名捨報不忙不亂故安詳坐脫立亡故云如入禪定阿彌陀佛下明感應道交令諸衆生下明見聞利益如文可知三往生願我於爾時乘金剛臺隨從佛後如彈指頃生極樂國七寶池內勝蓮華中華開見佛見諸菩薩聞妙法音獲無生忍於須臾間承事諸佛親蒙授記得授記已三身四智五眼六通無量百千陀羅尼門一切功德皆悉成就金剛臺即蓮華座其座金剛所成故名金剛臺又華內蓮房亦名為臺上品上生乃有此臺如彈指頃言往生之速也勝蓮華即金剛臺上之華無生忍者一切諸法本自不生不滅衆生顛倒妄見生滅今以智慧而了達之故云獲無生忍得此忍已便登初住大用現前承事諸佛下正明其相三身者法身報身化身四智者一大圓鏡智二平等性智三妙觀察智四成所作智五眼者肉眼天眼慧眼法眼佛眼六通者天眼天耳他心宿命神足漏盡也陀羅尼翻總持謂總一切法持無量義也一切功德句總結上文皆悉成就者是初住分成就非究竟成就也初自利竟二利他然後不違安養回入娑婆分身無數遍十方剎以不可思議自在神力種種方便度脫衆生咸令離染還得淨心同生西方入不退地問菩薩化他不於淨土而於穢土者何也答以淨土中人有善無惡化度則易穢土惡多善少化度則難難故大悲增長行願堅牢易故悲心不深行願不廣大彌陀經云此土修行一日勝於西方淨土修行一劫者蓋謂此也又此娑婆是本昔受生之處有緣必多化度宜急所以生淨土後必先回入又問徑在此土化導有何不可何須捨此趨彼然後回入答若不捨此則墮落有分化導何從若不往彼則自利未能利他安保喻如貧人未見帝王未蒙官職則自尚飢寒凍餒之不暇又焉能周給鄰里鄉黨乎故知不願度生則已願則必求西方不生西方則已生則必須回入又問適欲往生又欲回入得無進退躊躇志不決定邪答先期自利故願往生後願利他故須回入發心雖在一時行事則有先後若不先發此意一生淨土回入則難其如四恩三有何故知未得往生決無復入胞胎之念既生安養決無不來化導之心此正明決定何謂不定邪言不違安養者法身不動也言回入娑婆者化身應現也如一月千江不升不降從體起用亦復如是非獨一國亦遍十方種熟脫三番番不息小乘外道作意神通名可思議一心作一不能作多名不自在菩薩不爾不消作意化化無窮故名不可思議自在神力也慳貪者以財施攝剛強者以愛語攝為善者以利益攝行惡者以同事攝故名種種方便使其三惑不起名為離染三德圓證名為淨心見思塵沙無明為三惑法身般若解脫為三德咸令離染二句是現世益同生西方二句是後世益不退有三一位不退終不退為凡夫二乘二行不退決無退失所修行業三念不退決無一念忘失錯誤又一入西方縱在疑城邊地下品下生終不退入三途故總名不退也問西方不退設使回入娑婆還有退否答如上所明三身四智種種現前加以彌陀護念諸佛攝受焉有退失之理喻如衣錦還鄉順風搖櫓無求不利無往不前菩薩度生所以必欲求生西方而後回入者良由於此三總結二願如是大願世界無盡衆生無盡業及煩惱一切無盡我願無盡如是大願總結前文世界無盡等是舉例我願句總顯無盡如云世界不可盡我願不可盡衆生不可盡業及煩惱不可盡我願不可盡若四種可盡我願乃可盡問何故發此無盡不願邪答以由心無盡故隨心所發誓願亦無有盡又世界等四並由心具縱然成佛亦無可盡之理又問願既無盡成佛何時答所言成佛祇是識得自心究竟不生耳至於三十二相方便施為本非真實尚何成與不成之可論哉初發願竟次回向願今禮佛發願修持功德回施有情四恩總報三有齊資法界衆生同圓種智菩薩修行必先回向者以若不回向則是人天果報若能回向則成出世正因故也回向有三一回己向他二回因向果三回事向理云何回己向他以由衆生無始時來所修善業並為己身及己眷屬今回此心向於衆生以己所修悉施於彼願他得利不求自樂是名回己向他云何回因向果以無始來但為人天福報不求出世實果今回此心向於無上菩提所修善業悉用莊嚴佛果是名回因向果云何回事向理若見有衆生諸佛善法回向種種差別則事不空今回此心向於實際能修所修能向所向二俱寂滅是名回事向理今言恩有齊資是回己向他同圓種智是回因向果此二並是事相理在事中故三皆具足種智者佛之智慧也謂能知諸法一相亦能知種種相無二無別故名種智也問所修善業雖有若無名不住相今一事甫畢汲汲回向不已著乎答汝言善不住相為有後報否若無則墮斷滅若有則雖不求福福還隨汝人天果報固未免離云何無著今以此福回施衆生及以諸佛則成無漏勝因何著之有問回施衆生衆生實得利益否若無利益則成虗妄若有利益則我作他受焉有此理答菩薩福德與衆生共現在雖無利益未來成佛則衆生受賜如彌陀佛國凡未生者即同佛受用並由世尊因地作福回施我等是故今日得其果報如父財子用孰曰不可乎問回向與不回向功有勝劣事有得失否答回向則少福成多如一滴投海不可分別不回向則多福轉少如水灌漏巵須臾即盡又若能回向則心能轉福徑往西方若不回向則心被福牽還生三界是以修淨業人凡有一善必先回向西方者蓋以此也問回向西方則自求快樂回向佛果則自求尊勝由來為己何與衆生答苟不為人則何須作佛如不因治亂焉用求王當知利人必先自利成己即是成他尚何彼此分別之有哉問衆生本空菩提非有不見善法將何回向答雖知三事俱空而衆生不解妄造諸業妄受諸苦是故菩薩以善法而回向之又欲成佛而度脫之不廢修持因果耳若執俱空則反成偏見墮入二乘斷滅深坑矣是知具足三種回向是菩薩修行要行不可不知略釋願文竟
