body:
  text: 西方發願文註敘或有問於余曰諸經所載淨土文總有三篇其問詞致咸可宗尚而師獨於雲棲所作極口讚歎又其文義不為難解雲棲略注已自顯然而師復為之註釋者何也余曰餘文雖可宗尚而詞義未周獨此願文義周詞備請申言之此一願文大章有六一曰發菩提心二曰懺悔三障三曰立四宏誓四曰求生淨土五曰回入娑婆六曰總申回向如此六章始終備足何者葢念佛法門菩提最要大心不發淨土難期故首之以發菩提心心志雖立惑業尚纏果報一來何從得免故繼之以懺悔三障煩惑既淨業累都蠲宏誓不堅修行易退故申之以四宏誓願心願並發惑業雙消則三昧可成九蓮易往故要之以求生淨土但期自利是名小乘普願利他方名大士故次之以回入娑婆自他因果事理俱圓故以總申回向終焉此之六法一不可缺缺一則為人天小果缺二則受三途惡報缺三則懈怠易生缺四則輪回難免缺五則聲聞獨善缺六則因果非圓餘淨土文但有求生之願而無回入之文發心立誓既未彰明懺悔回向亦無陳述故言詞義未周也然此願文雲棲雖解一往但明大意其中理致則蘊而未發初心鈍根尚難開解是以不憚繁文復為註釋葢此法門屬於圓教不明圓理豈是圓人苟非圓人則安發圓願安修圓行邪故此注文言四宏則必歸無作言回向則舉必具三無事而非即理有願皆從稱性又恐末世行人少諳教義故諸名相不敢備述但取其意變換其文祇逗初機敢聞宿學其有因此少文略通片義然後而求大乘經典諸祖著述方知菩薩修行法門諸佛成道因果無不在是又豈別有一法出於願文之外者哉余之所以讚歎而註釋者以此問者唯唯而退余因遂理前言而為之敘雍正四年歲次丙午嘉平月之既望東吳虞山沙彌實賢書於海南蛟門之海雲精舍
